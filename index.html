<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Brick Football</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
  html, body { width: 100%; height: 100%; background: #0d1117; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
  #wrap { position: relative; width: 100%; height: 100vh; display: flex; align-items: center; justify-content: center; }
  canvas { display: block; touch-action: none; }
  #hud { position: absolute; top: 0; left: 0; width: 100%; display: flex; justify-content: space-between; padding: 10px 14px; color: #fff; font-size: 14px; font-weight: bold; pointer-events: none; text-shadow: 0 1px 3px rgba(0,0,0,0.6); }
  #balls { display: flex; gap: 4px; }
  .ball-icon { font-size: 16px; }
  #combo { position: absolute; top: 36px; left: 14px; color: #f39c12; font-size: 12px; font-weight: bold; text-shadow: 0 1px 3px rgba(0,0,0,0.6); }
    #startMsg, #roundMsg, #gameOverMsg {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    color: #fff; text-align: center; pointer-events: none; z-index: 20;
  }
  #startMsg { font-size: 18px; }
  #startMsg .big { font-size: 40px; margin-bottom: 8px; }
  #roundMsg { font-size: 28px; font-weight: bold; opacity: 0; transition: opacity 0.3s; text-shadow: 0 2px 8px rgba(0,0,0,0.8); }
  #gameOverMsg { display: none; background: rgba(0,0,0,0.85); border-radius: 16px; padding: 24px 32px; z-index: 50; pointer-events: auto; }
  #gameOverMsg h2 { font-size: 28px; margin-bottom: 8px; }
  #gameOverMsg p { font-size: 14px; color: #aaa; margin-bottom: 16px; }
  #gameOverMsg button { background: linear-gradient(135deg,#6c63ff,#3f3d9e); color:#fff; border:none; padding:12px 28px; border-radius:10px; font-size:15px; cursor:pointer; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game"></canvas>
 
 <div id="hud">
    <div id="score">⭐ 0</div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:2px">
      <div id="lives"></div>
      <div id="balls"></div>
    </div>
  </div>
  <button id="pauseBtn" style="position:absolute;top:8px;right:8px;background:rgba(0,0,0,0.4);color:#fff;border:none;border-radius:8px;padding:6px 10px;font-size:16px;z-index:30;">⏸️</button>
  <div id="pauseOverlay" style="display:none;position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:25;display:none;align-items:center;justify-content:center;color:#fff;font-size:24px;">⏸️ Pauza</div>
  <div id="combo"></div>
  <div id="startMsg">
    <div class="big">⚽</div>
    <div>Ekranga teging — boshlash uchun</div>
  </div>
  <div id="roundMsg"></div>
  <div id="gameOverMsg">
    <h2>⚽ O'yin tugadi!</h2>
    <p id="finalScore">Ochko: 0</p>
    <button onclick="restartGame()">🔄 Qayta boshlash</button>
  </div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();
tg.disableVerticalSwipes?.();

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
  W = Math.min(window.innerWidth, 360);
  H = Math.min(window.innerHeight, 640);
  canvas.width = W;
  canvas.height = H;
}
resize();
window.addEventListener('resize', resize);

// ===== GAME STATE =====
let player, ball, walls, score, balls, lives, combo, round, wallsBroken, gameStarted, gameOver, freezeTimer, ballScale, speedMult, playerSpeedMult;
 let wallSpeedMult = 1, wallSpeedTimer = 0, fogTimer = 0, paused = false; 
 let drops = [];
let trail = [];
let particles = [];
let shakeTime = 0, shakeIntensity = 0;

const COLS = 6;
function colWidth() { return W / COLS; }

function initGame() {
  player = { x: W/2 - 52, y: H - 50, w: 105, h: 14, speed: 6, targetX: W/2 - 52 };
  ball = { x: W/2, y: H - 70, vx: 0, vy: 0, r: 8, active: false };
  walls = [];
  score = 0;
  balls = 3;
  lives = 3;
  combo = 0;
  round = 1;
  wallsBroken = 0;
  freezeTimer = 0;
  ballScale = 1;
  speedMult = 1;
  playerSpeedMult = 1;
  gameStarted = false;
  gameOver = false;
  wallSpeedMult = 1; 
  wallSpeedTimer = 0; 
  fogTimer = 0; 
  paused = false;   
  drops = [];
  particles = [];
  shakeTime = 0;
  document.getElementById('pauseOverlay').style.display = 'none';
  document.getElementById('gameOverMsg').style.display = 'none';
  document.getElementById('startMsg').style.display = 'flex';
  document.getElementById('startMsg').style.flexDirection = 'column';
  document.getElementById('startMsg').style.alignItems = 'center';
  updateHUD();
  spawnBossWall();
}

// ===== DEVOR YARATISH =====
function spawnBossWall() {
  let type = 'brick';
  if (round === 2) type = 'concrete';
  else if (round === 3) type = 'ice';
  else if (round === 4) type = 'spikeBrickTop';
  else if (round === 5) type = 'spikeConcreteTop';
  else type = ['brick','concrete','ice','spikeBrickTop','spikeConcreteTop'][Math.floor(Math.random()*5)];

  walls.push({
    x: 0, y: -60, w: W, h: 50,
    type, hp: type === 'concrete' || type === 'spikeConcreteTop' ? 2 : 1,
    maxHp: type === 'concrete' || type === 'spikeConcreteTop' ? 2 : 1,
    isBoss: true
  });
}

function randomWallType() {
  const r = Math.random();
  if (round === 1) return 'brick';
  if (round === 2) return r < 0.8 ? 'brick' : 'concrete';
  if (round === 3) {
    if (r < 0.5) return 'brick';
    if (r < 0.8) return 'concrete';
    return 'ice';
  }
  if (round === 4) {
    if (r < 0.4) return 'brick';
    if (r < 0.6) return 'concrete';
    if (r < 0.75) return 'ice';
    return Math.random() < 0.5 ? 'spikeBrickTop' : 'spikeBrickBottom';
  }
  // round 5+
  const types = ['brick','concrete','ice','spikeBrickTop','spikeBrickBottom','spikeConcreteTop','spikeConcreteBottom'];
  let picked = types[Math.floor(Math.random()*types.length)];
  if (wallsBroken > 200 && Math.random() < 0.03) return 'diamond';
  if (wallsBroken > 80 && Math.random() < 0.06) return 'explosive';
  return picked;
}

function spawnNormalWall() {
  let type = randomWallType();
  let dropType = null;
  const r2 = Math.random();
  if (r2 < 0.05) dropType = 'red';
  else if (r2 < 0.13) dropType = 'green';
  const wCols = Math.min(COLS, Math.max(1, Math.floor(Math.random()*3)+1)); // 1-3 ustun, max 50% (6 dan 3)
  const startCol = Math.floor(Math.random() * (COLS - wCols + 1));
  const w = wCols * colWidth();
  const x = startCol * colWidth();
  const hp = (type === 'concrete' || type === 'spikeConcreteTop' || type === 'spikeConcreteBottom') ? 2 : 1;
walls.push({
    x, y: -40, w, h: 32,
    type, hp, maxHp: hp,
    isBoss: false,
    dropType
  });
}

// ===== INPUT =====
let pointerActive = false;
let lastPointerX = 0;
canvas.addEventListener('pointerdown', (e) => {
  pointerActive = true;
  lastPointerX = e.clientX;
  if (!gameStarted && !gameOver) {
    gameStarted = true;
    document.getElementById('startMsg').style.display = 'none';
    launchBall();
  }
});
canvas.addEventListener('pointermove', (e) => {
  if (!pointerActive) return;
  const rect = canvas.getBoundingClientRect();
  const deltaCss = e.clientX - lastPointerX;
  const delta = deltaCss * (W / rect.width);
  player.targetX = Math.max(0, Math.min(W - player.w, player.targetX + delta));
  lastPointerX = e.clientX;
});
canvas.addEventListener('pointerup', () => pointerActive = false);
canvas.addEventListener('pointercancel', () => pointerActive = false);

function launchBall() {
  ball.active = true;
  ball.x = player.x + player.w/2;
  ball.y = player.y - ball.r - 2;
  const angle = -Math.PI/2 + (Math.random() - 0.5) * 0.6;
  const speed = 6 * speedMult;
  ball.vx = Math.cos(angle) * speed;
  ball.vy = Math.sin(angle) * speed;
}

// ===== AUDIO =====
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function snd(freq, dur, type='square', vol=0.15) {
  try {
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    o.start(); o.stop(audioCtx.currentTime + dur);
  } catch(e) {}
}
function sndHit() { snd(500, 0.08); }
function sndBreak() { snd(300, 0.12); snd(450, 0.08); }
function sndBreakBrick() { snd(280, 0.1, 'square'); snd(180, 0.08, 'square'); }
function sndBreakConcrete() { snd(150, 0.15, 'sawtooth'); snd(100, 0.12, 'square'); }
function sndBreakIce() { snd(900, 0.1, 'sine', 0.12); snd(1200, 0.08, 'sine', 0.1); }
function sndBreakSpike() { snd(200, 0.05, 'sawtooth'); snd(800, 0.06, 'square', 0.1); }
function sndExplode() { snd(80, 0.3, 'sawtooth', 0.3); snd(50, 0.4, 'square', 0.25); }
function sndDiamond() { [800,1000,1200,1500].forEach((f,i)=>setTimeout(()=>snd(f,0.15,'sine',0.15), i*60)); }
function sndDropCatchGood() { snd(700, 0.08, 'sine', 0.15); snd(1000, 0.1, 'sine', 0.12); }
function sndDropCatchBad() { snd(250, 0.15, 'sawtooth', 0.2); snd(150, 0.2, 'square', 0.15); }
function sndCatch() { snd(700, 0.06, 'sine', 0.12); }
function sndLose() { snd(150, 0.3, 'sawtooth', 0.25); snd(100, 0.4, 'sawtooth', 0.2); }
function sndCombo() { snd(900, 0.1, 'sine', 0.15); snd(1100, 0.1, 'sine', 0.1); }
function sndOver() { snd(200, 0.4, 'sawtooth', 0.3); }

// ===== UPDATE =====
let wallSpeed = 1;
let lastWallSpawn = 0;
let frame = 0;

function updateHUD() {
  document.getElementById('score').textContent = `⭐ ${score}`;
  const ld = document.getElementById('lives');
  ld.innerHTML = '';
  for (let i = 0; i < lives; i++) {
    const s = document.createElement('div');
    s.className = 'ball-icon'; s.textContent = '❤️';
    ld.appendChild(s);
  }
  const bd = document.getElementById('balls');
  bd.innerHTML = '';
  for (let i = 0; i < balls; i++) {
    const s = document.createElement('div');
    s.className = 'ball-icon'; s.textContent = '⚽';
    bd.appendChild(s);
  }
  const cb = document.getElementById('combo');
  cb.textContent = combo >= 5 ? `🔥 Combo x${combo}` : '';
}

function showRoundMsg(text) {
  const el = document.getElementById('roundMsg');
  el.textContent = text;
  el.style.opacity = '1';
  setTimeout(() => el.style.opacity = '0', 1400);
}

function comboLevel() {
  if (combo >= 60) return 5;
  if (combo >= 40) return 4;
  if (combo >= 25) return 3;
  if (combo >= 10) return 2;
  return 1;
}

function onComboIncrease() {
  combo++;
  const prevLevel = comboLevel();
  if (combo === 10 || combo === 25 || combo === 40 || combo === 60) {
    sndCombo();
    ballScale = 1 + comboLevel() * 0.08;
    showRoundMsg(`🔥 COMBO x${combo}!`);
  }
}

function resetCombo() {
  combo = 0;
  ballScale = 1;
}

function checkRound() {
  const thresholds = [20, 50, 90, 140, 200];
  const idx = round - 1;
  if (idx < thresholds.length && wallsBroken >= thresholds[idx] && round === idx + 1) {
    round++;
    showRoundMsg(`ROUND ${round}` + (round===4?' - MIXLI DEVORLAR':round===5?' - HAMMASI ARALASH':''));
    walls = walls.filter(w => w.isBoss || w.y < 0);
    spawnBossWall();
    lastWallSpawn = frame;
  }
}

function update() {
  if (paused) return;
  frame++;
  // Player smooth move
  const ps = player.speed * playerSpeedMult;
  if (player.x < player.targetX) player.x = Math.min(player.targetX, player.x + ps*1.5);
  else if (player.x > player.targetX) player.x = Math.max(player.targetX, player.x - ps*1.5);
  player.x = Math.max(0, Math.min(W - player.w, player.x));

  if (!gameStarted || gameOver) return;

  // Freeze effect on walls
  const wallsFrozen = freezeTimer > 0;
  if (freezeTimer > 0) freezeTimer--;

  // Ball move
 if (ball.active) {
    trail.push({x: ball.x, y: ball.y});
    if (trail.length > 8) trail.shift();
    ball.x += ball.vx;
    ball.y += ball.vy;

    // wall collisions (screen edges)
    if (ball.x - ball.r*ballScale < 0) { ball.x = ball.r*ballScale; ball.vx *= -1; }
    if (ball.x + ball.r*ballScale > W) { ball.x = W - ball.r*ballScale; ball.vx *= -1; }
    if (ball.y - ball.r*ballScale < 0) { ball.y = ball.r*ballScale; ball.vy *= -1; }

    // brick collisions
    for (let i = walls.length - 1; i >= 0; i--) {
      const w = walls[i];
      const r = ball.r * ballScale;
      if (ball.x + r > w.x && ball.x - r < w.x + w.w && ball.y + r > w.y && ball.y - r < w.y + w.h) {
             const fromTop = ball.y < w.y;
        const fromBottom = ball.y > w.y + w.h;
        handleWallHit(w, i);
        if (fromTop || fromBottom) ball.vy *= -1;
        else ball.vx *= -1;
        break; // only one collision per frame
      }
    }

   // Player catch (ball returns down)
    if (ball.vy > 0 && ball.y + ball.r*ballScale >= player.y && ball.y - ball.r*ballScale <= player.y + player.h) {
      if (ball.x + ball.r*ballScale >= player.x && ball.x - ball.r*ballScale <= player.x + player.w) {
        // caught - bounce based on hit position
        sndCatch();
        ball.y = player.y - ball.r*ballScale - 1;
        const hitPos = (ball.x - (player.x + player.w/2)) / (player.w/2); // -1..1
        const speed = Math.sqrt(ball.vx*ball.vx + ball.vy*ball.vy) || (6 * speedMult * ballScale);
        const angle = -Math.PI/2 + hitPos * (Math.PI/3); // up to 60 degrees
        ball.vx = Math.cos(angle) * speed;
        ball.vy = Math.sin(angle) * speed;
      }
    }

    // Ball lost (below player)
    if (ball.y - ball.r*ballScale > H) {
      loseBall();
    }
  }

  // Spawn normal walls
  if (!wallsFrozen) {
     const spawnInterval = Math.max(110, 200 - round*8);
    if (frame - lastWallSpawn > spawnInterval) {
      // don't spawn while boss wall present
      const hasBoss = walls.some(w => w.isBoss);
      if (!hasBoss) spawnNormalWall();
      lastWallSpawn = frame;
    }

    // Move walls down
     if (wallSpeedTimer > 0) { wallSpeedTimer--; if (wallSpeedTimer === 0) wallSpeedMult = 1; }
    if (fogTimer > 0) fogTimer--;
    const spd = (0.4 + round * 0.15 + Math.min(wallsBroken, 50) * 0.03) * speedMult * wallSpeedMult;
    for (let i = walls.length - 1; i >= 0; i--) {
      walls[i].y += spd;
   if (walls[i].y > player.y - 10) {
        walls.splice(i, 1);
        lives--;
        resetCombo();
        sndLose();
        shake(20, 10);
        updateHUD();
        if (lives <= 0) { endGame(); return; }
        continue;
      }
      if (walls[i].y > H + 50) walls.splice(i, 1);
    }
  }
// Drops harakati va ushlash
  for (let i = drops.length - 1; i >= 0; i--) {
    const d = drops[i];
    d.y += d.vy;
    if (d.y + 14 >= player.y && d.y - 14 <= player.y + player.h &&
        d.x >= player.x && d.x <= player.x + player.w) {
    if (d.type === 'green') {
        sndDropCatchGood();
        const effects = ['ball1','ball3','clearAll','allBrick','noSpike','bigBall','superKick','freezeAll','playerFast'];
        applyGreenBonus(effects[Math.floor(Math.random()*effects.length)]);
      } else {
        sndDropCatchBad();
        const reffects = ['wallsFast','ballSmall','playerSlow','ballSlow','fog','extraConcrete','loseBall','allConcrete'];
        applyRedBonus(reffects[Math.floor(Math.random()*reffects.length)]);
      }
      drops.splice(i, 1);
      continue;
    }
    if (d.y > H + 20) drops.splice(i, 1);
  }
 // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.2; p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
  if (shakeTime > 0) shakeTime--;
  checkRound();
  updateHUD();
}
function applyGreenBonus(eff) {
  switch(eff) {
    case 'ball1': balls += 1; showRoundMsg('+1 ⚽'); break;
    case 'ball3': balls += 3; showRoundMsg('+3 ⚽'); break;
    case 'clearAll': walls.length = 0; score += walls.length*5; showRoundMsg('💥 Tozalandi!'); break;
    case 'allBrick': walls.forEach(w => { if (w !== walls[walls.length-1]) { w.type='brick'; w.hp=1; w.maxHp=1; } }); showRoundMsg('🧱 Hammasi g\'isht!'); break;
    case 'noSpike': walls.forEach(w => { if (w.type.startsWith('spike')) w.type = w.type.includes('Concrete') ? 'concrete' : 'brick'; }); showRoundMsg('🚫 Mixlar yo\'qoldi'); break;
    case 'bigBall': ballScale = Math.min(2, ballScale + 0.4); showRoundMsg('⚽ Katta to\'p!'); break;
    case 'superKick': speedMult = Math.min(2.5, speedMult + 0.5); showRoundMsg('⚡ Super zarba!'); break;
    case 'freezeAll': freezeTimer = 120; showRoundMsg('❄️ Devorlar muzladi'); break;
    case 'playerFast': playerSpeedMult = 1.6; setTimeout(()=>playerSpeedMult=1, 6000); showRoundMsg('🏃 Tezlik oshdi!'); break;
  }
  score += 20;
}
function applyRedBonus(eff) {
  switch(eff) {
    case 'wallsFast': wallSpeedMult = 1.6; wallSpeedTimer = 200; showRoundMsg('⚠️ Devorlar tezlashdi'); break;
    case 'ballFlicker': showRoundMsg('⚠️ To\'p miltillaydi'); break;
    case 'ballSmall': ballScale = Math.max(0.5, ballScale - 0.3); showRoundMsg('⚠️ To\'p kichrayadi'); break;
    case 'playerSlow': playerSpeedMult = 0.5; setTimeout(()=>playerSpeedMult=1, 4000); showRoundMsg('⚠️ Sekinlik!'); break;
    case 'ballSlow': speedMult = Math.max(0.5, speedMult - 0.3); setTimeout(()=>speedMult=Math.min(2.5,speedMult+0.3), 4000); showRoundMsg('⚠️ To\'p sekinlashdi'); break;
    case 'fog': fogTimer = 180; showRoundMsg('🌫️ Tuman!'); break;
    case 'extraConcrete': for(let i=0;i<2;i++) spawnNormalWall(); showRoundMsg('⚠️ Qo\'shimcha devorlar'); break;
    case 'loseBall': balls = Math.max(1, balls-1); updateHUD(); showRoundMsg('💔 -1 to\'p'); break;
    case 'allConcrete': walls.forEach(w => { if (w !== walls[walls.length-1] && w.type==='brick') { w.type='concrete'; w.hp=2; w.maxHp=2; } }); showRoundMsg('⚠️ Hammasi betonga'); break;
  }
}
 function spawnParticles(x, y, color, count=10) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y,
      vx: (Math.random()-0.5)*6,
      vy: (Math.random()-0.5)*6 - 2,
      life: 30 + Math.random()*20,
      color
    });
  }
}
function shake(time, intensity) {
  shakeTime = time;
  shakeIntensity = intensity;
}
function handleWallHit(w, idx) {
  const lvl = comboLevel();
  let destroyed = false;

  switch (w.type) {
    case 'brick':
      w.hp--; destroyed = true; break;
    case 'concrete':
      if (lvl >= 3) { destroyed = true; }
      else { w.hp--; if (w.hp <= 0) destroyed = true; }
      break;
    case 'ice':
      destroyed = true;
      freezeTimer = 90;
      break;
    case 'spikeBrickTop':
    case 'spikeBrickBottom': {
      const correctSide = w.type === 'spikeBrickTop' ? (ball.y > w.y + w.h - 4) : (ball.y < w.y + 4);
      if (correctSide || lvl >= 4) destroyed = true;
      break;
    }
    case 'spikeConcreteTop':
    case 'spikeConcreteBottom': {
      const correctSide2 = w.type === 'spikeConcreteTop' ? (ball.y > w.y + w.h - 4) : (ball.y < w.y + 4);
      if (correctSide2 || lvl >= 4) {
        if (lvl >= 3) destroyed = true;
        else { w.hp--; if (w.hp <= 0) destroyed = true; }
      }
      break;
    }
    case 'explosive':
      destroyed = true;
      // destroy nearby walls
      for (let j = walls.length - 1; j >= 0; j--) {
        if (j === idx) continue;
        const other = walls[j];
        if (Math.abs(other.y - w.y) < 60) {
          walls.splice(j, 1);
          if (j < idx) idx--;
          score += 5; wallsBroken++;
        }
      }
      break;
    
    case 'diamond':
      destroyed = true;
      if (Math.random() < 0.5) balls += 2;
      else score += 100;
      showRoundMsg(Math.random() < 0.5 ? '+2 ⚽' : '+100 ⭐');
      break;
    default:
      destroyed = true;
  }

if (destroyed) {
    let pColor = '#c0392b';
    if (w.type === 'concrete' || w.type.startsWith('spikeConcrete')) pColor = '#7f8c8d';
    else if (w.type === 'ice') pColor = '#85c1e9';
    else if (w.type === 'explosive') pColor = '#e67e22';
    else if (w.type === 'diamond') pColor = '#9b59b6';
    spawnParticles(w.x + w.w/2, w.y + w.h/2, pColor, w.type==='explosive'?20:10);
    if (w.type === 'explosive') shake(15, 8);
    if (w.type === 'concrete' || w.type.startsWith('spikeConcrete')) sndBreakConcrete();
    else if (w.type === 'ice') sndBreakIce();
    else if (w.type.startsWith('spike')) sndBreakSpike();
    else if (w.type === 'explosive') sndExplode();
    else if (w.type === 'diamond') sndDiamond();
    else sndBreakBrick();
    if (w.dropType) {
      drops.push({
        x: w.x + w.w/2, y: w.y + w.h/2,
        type: w.dropType, vy: 7
      });
    }
    walls.splice(idx, 1);
    score += 10 * lvl;
    wallsBroken++;
    onComboIncrease();
    return 'destroyed';
  } else {
    sndHit();
    return 'bounce';
  }
}

function loseBall() {
  sndLose();
  resetCombo();
  balls--;
  updateHUD();
  if (balls <= 0) {
    endGame();
  } else {
    ball.active = false;
    setTimeout(() => {
      ball.x = player.x + player.w/2;
      ball.y = player.y - ball.r - 2;
      launchBall();
    }, 400);
  }
}

function endGame() {
  gameOver = true;
  sndOver();
  document.getElementById('finalScore').textContent = `Ochko: ${score}  |  Devorlar: ${wallsBroken}  |  Raund: ${round}`;
  document.getElementById('gameOverMsg').style.display = 'block';
}

function restartGame() {
  initGame();
}

// ===== DRAW =====
function drawPlayer() {
  ctx.fillStyle = '#38ef7d';
  ctx.beginPath();
  ctx.roundRect(player.x, player.y, player.w, player.h, 6);
  ctx.fill();
}

function drawBall() {
  if (!ball.active) return;
  trail.forEach((t, i) => {
    const alpha = (i+1) / trail.length * 0.3;
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.beginPath();
    ctx.arc(t.x, t.y, ball.r * ballScale * (0.5 + i/trail.length*0.5), 0, Math.PI*2);
    ctx.fill();
  });
  const lvl = comboLevel();
  const ballColors = ['#fff','#fff','#a8e6ff','#ffd6a8','#ffb3b3','#ff7a3d'];
  ctx.fillStyle = ballColors[lvl] || '#fff';
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.r * ballScale, 0, Math.PI*2);
  ctx.fill();
  if (comboLevel() >= 5) {
    ctx.fillStyle = 'rgba(255,100,0,0.4)';
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.r * ballScale * 1.6, 0, Math.PI*2);
    ctx.fill();
  }
}

function drawWalls() {
  walls.forEach(w => {
    let color = '#b5651d';
    let spikeColor = '#888';
    switch (w.type) {
      case 'brick': color = '#c0392b'; break;
      case 'concrete': color = '#7f8c8d'; break;
      case 'ice': color = '#85c1e9'; break;
      case 'spikeBrickTop': case 'spikeBrickBottom': color = '#c0392b'; break;
      case 'spikeConcreteTop': case 'spikeConcreteBottom': color = '#7f8c8d'; break;
      case 'explosive': color = '#e74c3c'; break;
      case 'diamond': color = '#9b59b6'; break;

    }
    ctx.fillStyle = color;
    ctx.fillRect(w.x+1, w.y+1, w.w-2, w.h-2);

    // crack for concrete with hp1
    if ((w.type === 'concrete' || w.type === 'spikeConcreteTop' || w.type === 'spikeConcreteBottom') && w.hp < w.maxHp) {
      ctx.strokeStyle = '#2c3e50';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(w.x+w.w*0.2, w.y+2);
      ctx.lineTo(w.x+w.w*0.5, w.y+w.h*0.6);
      ctx.lineTo(w.x+w.w*0.8, w.y+w.h-2);
      ctx.stroke();
    }

   // ikonkalar
    ctx.font = '16px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    let icon = '';
    switch(w.type) {
      case 'brick': icon = '🧱'; break;
      case 'concrete': icon = '🪨'; break;
      case 'ice': icon = '❄️'; break;
      case 'spikeBrickTop': case 'spikeBrickBottom': icon = '⚠️'; break;
      case 'spikeConcreteTop': case 'spikeConcreteBottom': icon = '⚠️'; break;
      case 'explosive': icon = '💥'; break;
    }
    if (icon) ctx.fillText(icon, w.x + w.w/2, w.y + w.h/2 + 5);

    // spikes
    if (w.type.startsWith('spike')) {
      const top = w.type.endsWith('Top');
      ctx.fillStyle = spikeColor;
      const spikeCount = Math.floor(w.w / 16);
      for (let i = 0; i < spikeCount; i++) {
        const sx = w.x + i*16 + 4;
        ctx.beginPath();
        if (top) {
          ctx.moveTo(sx, w.y);
          ctx.lineTo(sx+8, w.y);
          ctx.lineTo(sx+4, w.y-8);
        } else {
          ctx.moveTo(sx, w.y+w.h);
          ctx.lineTo(sx+8, w.y+w.h);
          ctx.lineTo(sx+4, w.y+w.h+8);
        }
        ctx.closePath();
        ctx.fill();
      }
    }

    if (w.type === 'diamond') {
      ctx.fillStyle = '#fff';
      ctx.font = '20px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('💎', w.x + w.w/2, w.y + w.h/2 + 7);
    }
    if (w.type === 'explosive') {
      ctx.fillStyle = '#fff';
      ctx.font = '18px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('💥', w.x + w.w/2, w.y + w.h/2 + 6);
    }

    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
    ctx.lineWidth = 1;
    ctx.strokeRect(w.x+1, w.y+1, w.w-2, w.h-2);
  });
}
function drawDrops() {
  drops.forEach(d => {
    ctx.fillStyle = d.type === 'green' ? '#27ae60' : '#c0392b';
    ctx.beginPath();
    ctx.arc(d.x, d.y, 12, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = '14px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(d.type === 'green' ? '🎁' : '⚠️', d.x, d.y + 5);
  });
}
 function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha = Math.max(0, p.life/40);
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x-2, p.y-2, 4, 4);
  });
  ctx.globalAlpha = 1;
}
function draw() {
  ctx.save();
  if (shakeTime > 0) {
    const dx = (Math.random()-0.5) * shakeIntensity;
    const dy = (Math.random()-0.5) * shakeIntensity;
    ctx.translate(dx, dy);
  }
  ctx.fillStyle = '#0d1117';
  ctx.fillRect(0, 0, W, H);

  // field lines
  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.lineWidth = 1;
  for (let i = 1; i < COLS; i++) {
    ctx.beginPath();
    ctx.moveTo(i*colWidth(), 0);
    ctx.lineTo(i*colWidth(), H);
    ctx.stroke();
  }

  drawWalls();
  drawDrops();
  drawParticles();
  drawPlayer();
  drawBall();

  if (freezeTimer > 0) {
    ctx.fillStyle = 'rgba(133,193,233,0.12)';
    ctx.fillRect(0,0,W,H);
  }
if (fogTimer > 0) {
    ctx.fillStyle = 'rgba(255,255,255,0.18)';
    ctx.fillRect(0,0,W,H);
  }
  ctx.restore();
}

document.getElementById('pauseBtn').addEventListener('click', () => {
  if (!gameStarted || gameOver) return;
  paused = !paused;
  document.getElementById('pauseOverlay').style.display = paused ? 'flex' : 'none';
  document.getElementById('pauseBtn').textContent = paused ? '▶️' : '⏸️';
});

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

initGame();
loop();
</script>
